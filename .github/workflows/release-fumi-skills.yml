name: release-fumi-skills

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump plugin version (local)
        id: bump
        run: |
          version=$(./scripts/bump-plugin-version.sh "${{ inputs.bump }}")
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/skills-v$VERSION" >/dev/null; then
            echo "tag skills-v$VERSION already exists" >&2
            exit 1
          fi

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/fumi/.claude-plugin/plugin.json
          git commit -m "Release skills-v$VERSION"
          git tag "skills-v$VERSION"
          git push --atomic origin "HEAD:${GITHUB_REF_NAME}" "skills-v$VERSION"
