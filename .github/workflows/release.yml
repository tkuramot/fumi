name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW=$(./scripts/bump-version.sh "${{ inputs.bump }}")
          git push origin "v$NEW"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chrome-extension/pnpm-lock.yaml

      - name: Build and package Chrome extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          pnpm -C chrome-extension install --frozen-lockfile
          pnpm -C chrome-extension build
          MANIFEST=chrome-extension/dist/manifest.json
          VERSION="$VERSION" perl -i -pe 's|("version"\s*:\s*")[^"]*(")|$1$ENV{VERSION}$2|' "$MANIFEST"
          mkdir -p release-artifacts
          (cd chrome-extension/dist && zip -r "../../release-artifacts/fumi-extension_${VERSION}.zip" .)

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
