name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: chrome-extension/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chrome-extension/pnpm-lock.yaml

      # Bump manifest locally only — no commit/push yet, so build failures
      # don't leave a half-bumped main or an orphan tag.
      - name: Bump manifest version (local)
        id: bump
        run: |
          version=$(./scripts/bump-version.sh "${{ inputs.bump }}")
          echo "version=$version" >>"$GITHUB_OUTPUT"

      # Fail fast if the tag already exists, before doing the (expensive) build.
      - name: Check tag does not already exist
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/v$VERSION" >/dev/null; then
            echo "tag v$VERSION already exists" >&2
            exit 1
          fi

      - name: Build and package Chrome extension
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          pnpm -C chrome-extension install --frozen-lockfile
          pnpm -C chrome-extension build
          mkdir -p release-artifacts
          (cd chrome-extension/dist && zip -r "../../release-artifacts/fumi-extension_${VERSION}.zip" .)

      # Build succeeded — commit the bump and push branch+tag atomically so
      # we never leave the bump commit on main without its tag (or vice versa).
      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chrome-extension/public/manifest.json
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push --atomic origin "HEAD:${GITHUB_REF_NAME}" "v$VERSION"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
