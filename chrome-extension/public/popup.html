<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>fumi</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1f2328;
        --muted: #656d76;
        --border: #d0d7de;
        --surface: #f6f8fa;
        --ok-fg: #1a7f37;
        --ok-bg: #dafbe1;
        --err-fg: #d1242f;
        --err-bg: #ffebe9;
        --idle-fg: #59636e;
        --idle-bg: #eaeef2;
        --btn-bg: #f6f8fa;
        --btn-bg-hover: #eef1f4;
        --btn-border: #d0d7de;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1f24;
          --fg: #e6edf3;
          --muted: #8d96a0;
          --border: #30363d;
          --surface: #22272e;
          --ok-fg: #3fb950;
          --ok-bg: #0f2e1a;
          --err-fg: #f85149;
          --err-bg: #3a1416;
          --idle-fg: #8d96a0;
          --idle-bg: #2a2f37;
          --btn-bg: #22272e;
          --btn-bg-hover: #2d333b;
          --btn-border: #30363d;
          --accent: #4493f8;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
        padding: 14px;
        width: 300px;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .version {
        color: var(--muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 22px;
      }
      .row + .row {
        margin-top: 6px;
      }
      .label {
        color: var(--muted);
        font-size: 12px;
      }
      .value {
        color: var(--fg);
        font-variant-numeric: tabular-nums;
        text-align: right;
        word-break: break-word;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        background: var(--idle-bg);
        color: var(--idle-fg);
      }
      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .badge.ok {
        background: var(--ok-bg);
        color: var(--ok-fg);
      }
      .badge.err {
        background: var(--err-bg);
        color: var(--err-fg);
      }
      .error-card {
        display: none;
        background: var(--err-bg);
        border-color: var(--err-fg);
        color: var(--err-fg);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .error-card.visible {
        display: block;
      }
      button {
        width: 100%;
        padding: 7px 12px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        color: var(--fg);
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.1s ease;
      }
      button:hover:not(:disabled) {
        background: var(--btn-bg-hover);
      }
      button:active:not(:disabled) {
        transform: translateY(0.5px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>fumi</h1>
      <span id="version" class="version"></span>
    </header>

    <div class="card">
      <div class="row">
        <span class="label">Status</span>
        <span id="status" class="badge">—</span>
      </div>
      <div class="row">
        <span class="label">Actions</span>
        <span id="count" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Fetched</span>
        <span id="at" class="value" title="">—</span>
      </div>
    </div>

    <div id="error" class="card error-card"></div>

    <button id="refresh">Refresh actions</button>
    <script type="module" src="popup/popup.js"></script>
  </body>
</html>
